<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
      <meta name="color-scheme" content="light" />
    <title>扫码投票页 · 实时排行</title>
      <style>
      :root {
        --bg: #eef4fb;
        --bg2: #ddebf8;
        --panel: rgba(255, 255, 255, 0.92);
        --panel-strong: rgba(255, 255, 255, 0.98);
        --text: #102033;
        --muted: #5c6b7d;
        --line: rgba(16, 32, 51, 0.1);
        --accent: #1769d1;
        --accent-2: #12a7b8;
        --success: #178a57;
        --shadow: 0 22px 55px rgba(20, 50, 90, 0.12);
        --radius-xl: 30px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --max: 1440px;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        color: var(--text);
        font-family: "STSong", "Songti SC", "Noto Serif SC", "Source Han Serif SC", serif;
        background:
          radial-gradient(circle at 14% 16%, rgba(23, 105, 209, 0.14), transparent 24%),
          radial-gradient(circle at 86% 14%, rgba(18, 167, 184, 0.14), transparent 22%),
          radial-gradient(circle at 20% 82%, rgba(23, 138, 87, 0.1), transparent 28%),
          linear-gradient(135deg, var(--bg), var(--bg2));
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.12) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.12) 1px, transparent 1px);
        background-size: 56px 56px;
        opacity: 0.35;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.26), transparent 86%);
      }

      .shell {
        position: relative;
        max-width: var(--max);
        margin: 0 auto;
        padding: 20px 16px 24px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.16fr) minmax(360px, 0.84fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.85);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
      }

      .main {
        padding: 24px;
        min-height: 92vh;
      }

      .side {
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .topline,
      .section-head,
      .status-row,
      .card-head,
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .eyebrow,
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(55, 40, 28, 0.1);
        background: rgba(255, 255, 255, 0.68);
        color: var(--muted);
        font-size: 13px;
      }

      .eyebrow::before,
      .pill::before {
        content: "";
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 0 0 4px rgba(23, 105, 209, 0.12);
      }

      .hero {
        margin-top: 14px;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(24px, 3vw, 42px);
        line-height: 1.15;
        letter-spacing: -0.055em;
        font-weight: 800;
      }

      .sub {
        margin: 0;
        max-width: 64ch;
        color: var(--muted);
        font-size: clamp(16px, 1.6vw, 19px);
        line-height: 1.7;
      }

      .status-row {
        flex-wrap: wrap;
        justify-content: flex-start;
        margin-top: 18px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(55, 40, 28, 0.1);
        background: rgba(255, 255, 255, 0.72);
        font-size: 14px;
      }

      .chip strong {
        font-size: 16px;
      }

      .chip.live {
        color: var(--success);
        border-color: rgba(23, 138, 87, 0.2);
        background: rgba(23, 138, 87, 0.08);
      }

      .banner {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(55, 40, 28, 0.1);
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        line-height: 1.65;
        font-size: 14px;
      }

      .banner strong {
        color: var(--text);
      }

      .section {
        margin-top: 18px;
      }

      .section-head {
        align-items: end;
        margin-bottom: 14px;
      }

      .section-head h2,
      .side h2 {
        margin: 0;
        font-size: 22px;
        letter-spacing: -0.03em;
      }

      .section-head p,
      .side p,
      .card-head p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .tool {
        position: relative;
        text-align: left;
        padding: 15px 15px 16px;
        border-radius: 18px;
        border: 1px solid rgba(55, 40, 28, 0.12);
        background: rgba(255, 255, 255, 0.9);
        color: var(--text);
        overflow: hidden;
      }

      .tool h3 {
        margin: 12px 0 6px;
        font-size: 17px;
        line-height: 1.35;
        letter-spacing: -0.02em;
      }

      .tool .num {
        display: inline-grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border-radius: 999px;
        background: rgba(23, 105, 209, 0.12);
        color: var(--accent);
        font-weight: 800;
        font-size: 13px;
      }

      .tool .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 12px;
      }

      .count {
        display: inline-flex;
        align-items: baseline;
        gap: 5px;
      }

      .count strong {
        font-size: 28px;
        line-height: 1;
      }

      .count span {
        color: var(--muted);
        font-size: 13px;
      }

      .tool .desc {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .tool .actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 8px;
        margin-top: 12px;
      }

      .btn {
        appearance: none;
        border: 0;
        border-radius: 14px;
        padding: 11px 12px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: transform 180ms ease, opacity 180ms ease, box-shadow 180ms ease;
      }

      .btn:hover { transform: translateY(-1px); }
      .btn.primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff8ef;
        box-shadow: 0 16px 30px rgba(23, 105, 209, 0.22);
      }
      .btn.secondary {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(55, 40, 28, 0.12);
        color: var(--text);
      }
      .btn.ghost {
        background: transparent;
        border: 1px dashed rgba(55, 40, 28, 0.18);
        color: var(--muted);
      }
      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
      }

      .rankings {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .rank {
        position: relative;
        display: grid;
        grid-template-columns: 54px minmax(0, 1fr) auto;
        align-items: center;
        gap: 14px;
        padding: 15px 16px;
        border-radius: 18px;
        border: 1px solid rgba(55, 40, 28, 0.08);
        background: rgba(255, 255, 255, 0.82);
        overflow: hidden;
      }

      .rank::before {
        content: "";
        position: absolute;
        inset: auto auto 0 0;
        width: calc(var(--pct) * 1%);
        height: 4px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
      }

      .no {
        width: 54px;
        height: 54px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, rgba(23, 105, 209, 0.14), rgba(18, 167, 184, 0.12));
        color: var(--accent);
        font-weight: 800;
        font-size: 20px;
      }

      .rank h3 {
        margin: 0;
        font-size: 18px;
        line-height: 1.25;
      }

      .rank .info {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .value {
        text-align: right;
        min-width: 88px;
      }

      .value strong {
        display: block;
        font-size: 30px;
        line-height: 1;
      }

      .value span {
        color: var(--muted);
        font-size: 13px;
      }

      .card {
        padding: 16px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(16, 32, 51, 0.08);
        background: rgba(255, 255, 255, 0.72);
      }

      .summary {
        display: grid;
        gap: 10px;
      }

      .summary-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(16, 32, 51, 0.08);
      }

      .summary-item b {
        font-size: 15px;
      }

      .summary-item span {
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .footer {
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%) translateY(18px);
        opacity: 0;
        pointer-events: none;
        background: rgba(16, 32, 51, 0.96);
        color: #fff;
        padding: 12px 16px;
        border-radius: 999px;
        box-shadow: 0 16px 30px rgba(0, 0, 0, 0.18);
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ── 状态横幅 ── */
      #stateBanner {
        margin-top: 20px;
        padding: 16px 20px;
        border-radius: var(--radius-lg);
        border: 1.5px solid transparent;
        display: flex;
        align-items: center;
        gap: 14px;
        transition: background 500ms ease, border-color 500ms ease;
      }
      .state-dot {
        width: 13px; height: 13px;
        border-radius: 50%;
        flex-shrink: 0;
        transition: background 400ms ease, box-shadow 400ms ease;
      }
      .state-text { flex: 1; }
      .state-label {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1.2;
        transition: color 400ms ease;
      }
      .state-sub {
        font-size: 13px;
        color: var(--muted);
        margin-top: 3px;
        line-height: 1.5;
      }
      .state-total {
        font-size: 13px;
        color: var(--muted);
        white-space: nowrap;
      }
      .state-total strong { font-size: 22px; color: var(--text); display: block; text-align: right; }

      /* waiting */
      body[data-state="waiting"] #stateBanner {
        background: rgba(92, 107, 125, 0.09);
        border-color: rgba(92, 107, 125, 0.18);
      }
      body[data-state="waiting"] .state-dot { background: #b0bec5; }
      body[data-state="waiting"] .state-label { color: var(--muted); }
      body[data-state="waiting"] .grid {
        opacity: 0.4;
        filter: grayscale(0.5);
        pointer-events: none;
      }
      body[data-state="waiting"] .rankings { opacity: 0.4; }

      /* running */
      body[data-state="running"] {
        background:
          radial-gradient(circle at 14% 16%, rgba(23, 105, 209, 0.22), transparent 28%),
          radial-gradient(circle at 86% 14%, rgba(18, 167, 184, 0.22), transparent 26%),
          radial-gradient(circle at 20% 82%, rgba(23, 138, 87, 0.12), transparent 30%),
          linear-gradient(135deg, #e4eef9, #cfe4f7);
      }
      body[data-state="running"] #stateBanner {
        background: linear-gradient(135deg, rgba(23, 105, 209, 0.13), rgba(18, 167, 184, 0.09));
        border-color: rgba(23, 105, 209, 0.35);
      }
      body[data-state="running"] .state-dot {
        background: var(--accent);
        box-shadow: 0 0 0 5px rgba(23, 105, 209, 0.18);
        animation: dotPulse 1.6s ease infinite;
      }
      body[data-state="running"] .state-label { color: var(--accent); }

      /* ended */
      body[data-state="ended"] #stateBanner {
        background: rgba(23, 138, 87, 0.09);
        border-color: rgba(23, 138, 87, 0.28);
      }
      body[data-state="ended"] .state-dot { background: var(--success); }
      body[data-state="ended"] .state-label { color: var(--success); }
      body[data-state="ended"] .grid { opacity: 0.45; pointer-events: none; }

      @keyframes dotPulse {
        0%, 100% { box-shadow: 0 0 0 4px rgba(23, 105, 209, 0.18); }
        50%       { box-shadow: 0 0 0 10px rgba(23, 105, 209, 0.04); }
      }

      /* 已投票的卡片高亮 */
      .tool.voted {
        border-color: rgba(23, 105, 209, 0.45);
        background: rgba(23, 105, 209, 0.07);
        box-shadow: 0 0 0 2px rgba(23, 105, 209, 0.14);
      }

      @media (max-width: 1120px) {
        .layout { grid-template-columns: 1fr; }
        .main { min-height: auto; }
      }

      @media (max-width: 720px) {
        .shell { padding: 12px; }
        .main, .side { padding: 16px; border-radius: 24px; }
        .grid { grid-template-columns: 1fr; }
        .rank { grid-template-columns: 46px minmax(0, 1fr); }
        .value {
          grid-column: 1 / -1;
          text-align: left;
          display: flex;
          align-items: baseline;
          justify-content: space-between;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="layout">
        <section class="panel main">
          <div class="topline">
            <div class="eyebrow">线上扫码投票 · 实时同步</div>
            <div class="pill">扫码进入 / 实时排行 / 主持人确认</div>
          </div>

          <header class="hero">
            <h1>你想先了解哪个工具呢？</h1>
            <p class="sub">
              台下观众扫码后即可投票，页面会实时同步得票排行。主持人最后确认讲解顺序，现场展示更直观。
            </p>
          </header>

          <div id="stateBanner">
            <div class="state-dot"></div>
            <div class="state-text">
              <div class="state-label" id="stateLabel">等待开始</div>
              <div class="state-sub" id="stateSub">请稍候，主持人即将开启投票</div>
            </div>
            <div class="state-total">
              <strong id="voteTotal">0</strong>票
            </div>
          </div>

          <div class="section">
            <div class="section-head">
              <div>
                <h2>投票区</h2>
                <p>每人只能投一票，投票后可换选其他选项。</p>
              </div>
              <div class="pill" id="modePill">扫码投票模式</div>
            </div>
            <div class="grid" id="toolGrid"></div>
          </div>

          <div class="section">
            <div class="section-head">
              <div>
                <h2>实时得票排行</h2>
                <p>默认按票数从高到低排序，平票时按编号排列。</p>
              </div>
              <div class="pill">主持人确认后，再按这个顺序讲解</div>
            </div>
            <div class="rankings" id="rankingList" aria-live="polite"></div>
          </div>

          <div class="footer">
            这是线上扫码投票版，适合投屏和手机同时使用。观众扫码后直接参与，结果实时同步。
          </div>
        </section>

      </div>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
      const ROOM_ID = "LIVE";
      const tools = [
        { id: 1, name: "报价单生成器", hint: "快速出报价" },
        { id: 2, name: "装箱计算器 / 柜型建议器", hint: "算体积与装柜" },
        { id: 3, name: "质量计算小工具", hint: "快速算参数" },
        { id: 4, name: "铭牌参数生成器", hint: "参数一键成文" },
        { id: 5, name: "电子签报销单 + 对账工具", hint: "签单报销一体" },
        { id: 6, name: "面试通知 + 流程管理工具", hint: "流程更顺" },
        { id: 7, name: "制度问答小助手", hint: "查制度更快" },
      ];

      // 每台设备一个固定 voterId，确保一人一票
      const VOTER_ID_KEY = "live-vote:voterId";
      let voterId = localStorage.getItem(VOTER_ID_KEY);
      if (!voterId) {
        voterId = "v-" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
        localStorage.setItem(VOTER_ID_KEY, voterId);
      }

      // 状态全部来自服务器
      let sState = { running: false, ended: false, confirmed: false, votes: {}, myVote: null };

      const els = {
        toolGrid: document.getElementById("toolGrid"),
        rankingList: document.getElementById("rankingList"),
        stateLabel: document.getElementById("stateLabel"),
        stateSub: document.getElementById("stateSub"),
        voteTotal: document.getElementById("voteTotal"),
        modePill: document.getElementById("modePill"),
        toast: document.getElementById("toast"),
      };

      function toast(message) {
        els.toast.textContent = message;
        els.toast.classList.add("show");
        clearTimeout(toast._t);
        toast._t = setTimeout(() => els.toast.classList.remove("show"), 1800);
      }

      function totalVotes() {
        return Object.values(sState.votes).reduce((s, v) => s + v, 0);
      }

      function sortedTools() {
        return [...tools].sort((a, b) => {
          const diff = (sState.votes[b.id] || 0) - (sState.votes[a.id] || 0);
          return diff !== 0 ? diff : a.id - b.id;
        });
      }

      function leaderName() {
        const top = sortedTools()[0];
        if (!top || (sState.votes[top.id] || 0) === 0) return "等待开始";
        return top.name;
      }

      function statusLabel() {
        if (!sState.running && !sState.ended) return "未开始";
        if (sState.ended) return "已结束";
        if (sState.confirmed) return "已确认";
        return "进行中";
      }

      function renderTools() {
        const canVote = sState.running && !sState.ended && !sState.confirmed;
        els.toolGrid.innerHTML = tools.map((tool) => {
          const count = sState.votes[tool.id] || 0;
          const isMyVote = sState.myVote === tool.id;
          return `<article class="tool${isMyVote ? " voted" : ""}">
            <span class="num">${tool.id}</span>
            <h3>${tool.name}</h3>
            <div class="desc">${tool.hint}</div>
            <div class="meta">
              <span class="count"><strong>${count}</strong><span>票</span></span>
              <span class="pill">${isMyVote ? "✓ 已投" : canVote ? "点一下投票" : "等待开启"}</span>
            </div>
            <div class="actions">
              <button class="btn ${isMyVote ? "secondary" : "primary"}" data-id="${tool.id}"
                ${canVote && !isMyVote ? "" : "disabled"}>${isMyVote ? "已投票" : "投票"}</button>
            </div>
          </article>`;
        }).join("");
        els.toolGrid.querySelectorAll("button[data-id]").forEach((btn) => {
          btn.addEventListener("click", () => vote(Number(btn.dataset.id)));
        });
      }

      function renderRankings() {
        const ordered = sortedTools();
        const max = Math.max(1, ...ordered.map((t) => sState.votes[t.id] || 0));
        const total = totalVotes();
        els.rankingList.innerHTML = ordered.map((tool, i) => {
          const count = sState.votes[tool.id] || 0;
          const pct = (count / max) * 100;
          return `<section class="rank" style="--pct:${Math.max(pct, count ? 8 : 0)}">
            <div class="no">${i + 1}</div>
            <div>
              <h3>${tool.name}</h3>
              <div class="info">
                <span>编号 ${tool.id}</span>
                <span>支持率 ${total ? Math.round((count / total) * 100) : 0}%</span>
              </div>
            </div>
            <div class="value"><strong>${count}</strong><span>票</span></div>
          </section>`;
        }).join("");
      }

      function renderSummary() {
        const total = totalVotes();
        if (els.voteTotal) els.voteTotal.textContent = String(total);
        if (els.modePill) els.modePill.textContent = sState.running ? "扫码投票模式 · 进行中" : "扫码投票模式 · 等待开启";

        // 状态横幅
        if (sState.running) {
          document.body.dataset.state = "running";
          if (els.stateLabel) els.stateLabel.textContent = "投票进行中";
          if (els.stateSub) els.stateSub.textContent = sState.myVote
            ? "你已投票，可点击其他选项换票"
            : "每人只能投一票，选一个你最想先了解的工具";
        } else if (sState.ended) {
          document.body.dataset.state = "ended";
          if (els.stateLabel) els.stateLabel.textContent = "投票已结束";
          if (els.stateSub) els.stateSub.textContent = "感谢参与！请看屏幕上的最终排行";
        } else {
          document.body.dataset.state = "waiting";
          if (els.stateLabel) els.stateLabel.textContent = "等待主持人开启投票";
          if (els.stateSub) els.stateSub.textContent = "请稍候，投票即将开始";
        }
      }

      function render() {
        renderTools();
        renderRankings();
        renderSummary();
      }

      function applyServerState(s) {
        sState.running  = s.started && !s.ended;
        sState.ended    = Boolean(s.ended);
        sState.confirmed = Boolean(s.confirmedAt);
        sState.votes    = s.votes || {};
        sState.myVote   = (s.ballots && s.ballots[voterId]) ? Number(s.ballots[voterId]) : null;
        render();
      }

      // 一人一票：POST /api/vote，服务器自动处理换票
      async function vote(id) {
        if (!sState.running || sState.ended) { toast("请先开启投票"); return; }
        if (sState.myVote === id) return;
        try {
          const res = await fetch("/api/vote", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ roomId: ROOM_ID, voterId, toolId: id }),
          });
          if (!res.ok) { toast("投票失败，请重试"); return; }
          const { state: s } = await res.json();
          applyServerState(s);
          toast("已投票");
        } catch { toast("网络错误，请重试"); }
      }

      // 实时轮询服务器状态（2 秒一次）
      let syncTimer = null;
      async function syncFromServer() {
        try {
          const res = await fetch(`/api/state?roomId=${ROOM_ID}`, { cache: "no-store" });
          if (!res.ok) return;
          const { state: s } = await res.json();
          applyServerState(s);
        } catch {}
      }
      render(); // 先渲染一次，不等服务器响应
      syncFromServer();
      syncTimer = setInterval(syncFromServer, 2000);
    </script>
  </body>
</html>
